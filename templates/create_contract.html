<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milestone | Create Contract</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-brand-dark { background-color: #0c3875; }
        .text-brand-dark { color: #0c3875; }
        .border-brand-dark { border-color: #0c3875; }
    </style>
</head>
<body class="bg-[#F4F7F9] min-h-screen flex items-center justify-center font-sans text-slate-800 p-4">

    <div class="bg-white w-full max-w-[450px] rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] p-8 border border-slate-100">
        
        <div class="flex items-center space-x-3 border-b border-slate-200 pb-4 mb-6">
            <div class="flex items-center space-x-1">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 16L9 9L13 14L19 6" stroke="#0c3875" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="20" cy="5" r="2" fill="#0c3875"/>
                </svg>
                <span class="text-lg font-bold text-brand-dark tracking-tight">Milestone</span>
            </div>
            <div class="h-5 w-px bg-slate-300"></div>
            <h1 class="text-lg font-semibold text-slate-800">Create New Escrow Contract</h1>
        </div>

        <form id="contractForm" class="space-y-5">
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Seller's Email Address</label>
                <input type="email" id="seller_email" required
                    class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-brand-dark focus:ring-1 focus:ring-brand-dark transition-colors" 
                    placeholder="e.g., freelancer@email.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Total Project Amount (₦)</label>
                <div class="flex shadow-sm rounded-lg">
                    <span class="inline-flex items-center px-4 rounded-l-lg border border-r-0 border-slate-300 bg-slate-50 text-slate-500 text-sm font-medium">
                        ₦
                    </span>
                    <input type="number" id="total_amount" required min="1"
                        class="flex-1 min-w-0 block w-full px-3 py-2.5 rounded-none rounded-r-lg border border-slate-300 text-sm focus:outline-none focus:border-brand-dark focus:ring-1 focus:ring-brand-dark transition-colors" 
                        placeholder="e.g., 150000">
                </div>
            </div>

            <div class="pt-2">
                <h3 class="text-sm font-bold text-slate-800 mb-3">Define Milestones</h3>
                
                <div class="flex items-end space-x-3 mb-4">
                    <div class="flex-1">
                        <label class="block text-xs font-medium text-slate-500 mb-1">Milestone 1</label>
                        <input type="text" id="m1_desc" required
                            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-brand-dark focus:ring-1 focus:ring-brand-dark transition-colors" 
                            placeholder="Initial Setup & Research">
                    </div>
                    <div class="w-24">
                        <label class="block text-xs font-medium text-slate-500 mb-1">Amount</label>
                        <div class="relative">
                            <input type="text" readonly value="50%" 
                                class="w-full px-3 py-2 border border-slate-300 bg-slate-50 rounded-lg text-sm text-slate-600 cursor-not-allowed text-center font-medium">
                        </div>
                    </div>
                </div>

                <div class="flex items-end space-x-3">
                    <div class="flex-1">
                        <label class="block text-xs font-medium text-slate-500 mb-1">Milestone 2</label>
                        <input type="text" id="m2_desc" required
                            class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:border-brand-dark focus:ring-1 focus:ring-brand-dark transition-colors" 
                            placeholder="Final Project Delivery">
                    </div>
                    <div class="w-24">
                        <label class="block text-xs font-medium text-slate-500 mb-1">Amount</label>
                        <div class="relative">
                            <input type="text" readonly value="50%" 
                                class="w-full px-3 py-2 border border-slate-300 bg-slate-50 rounded-lg text-sm text-slate-600 cursor-not-allowed text-center font-medium">
                        </div>
                    </div>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-brand-dark hover:bg-[#082a5a] text-white font-semibold py-3 rounded-lg transition-colors shadow-sm mt-6">
                Create Escrow Contract
            </button>
        </form>
    </div>

    <script>
        document.getElementById('contractForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Securing Contract...";
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            btn.disabled = true;

            const totalAmount = parseInt(document.getElementById('total_amount').value);
            const halfAmount = Math.floor(totalAmount / 2);
            const remainder = totalAmount - halfAmount;

            const payload = {
                buyer_id: "123e4567-e89b-12d3-a456-426614174000", 
                seller_email: document.getElementById('seller_email').value,
                title: "Freelance Services", 
                total_amount: totalAmount,
                milestone1_description: document.getElementById('m1_desc').value,
                milestone1_amount: halfAmount,
                milestone2_description: document.getElementById('m2_desc').value,
                milestone2_amount: remainder
            };

            try {
                const response = await fetch('/contract/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if (response.status === 201) {
                    localStorage.setItem('test_contract_id', data.contract_id);
                    localStorage.setItem('test_total_amount', totalAmount);
                    localStorage.setItem('test_seller_email', document.getElementById('seller_email').value);
                    localStorage.setItem('test_m1_desc', document.getElementById('m1_desc').value);
                    localStorage.setItem('test_m2_desc', document.getElementById('m2_desc').value);
                    
                    localStorage.removeItem('is_funded');
                    localStorage.removeItem('m1_submitted');
                    localStorage.removeItem('m1_paid');
                    localStorage.removeItem('m2_submitted');
                    localStorage.removeItem('m2_paid');
                    
                    window.location.href = '/buyer-dashboard';
                } else {
                    alert("Database Error: " + (data.error || "Unknown error"));
                    resetButton();
                }
            } catch (err) {
                alert("Network Error: Could not connect to Flask backend.");
                resetButton();
            }

            function resetButton() {
                btn.innerText = "Create Escrow Contract";
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
